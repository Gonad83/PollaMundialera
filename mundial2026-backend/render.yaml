services:
  - type: web
    name: mundial2026-backend
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npx prisma generate
    startCommand: npx prisma db push --accept-data-loss && node scripts/add-friendlies.js && node src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: REFRESH_TOKEN_SECRET
        sync: false
      - key: REFRESH_TOKEN_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: SYNC_SECRET
        sync: false
      - key: MERCADOPAGO_ACCESS_TOKEN
        sync: false
      - key: FOOTBALL_DATA_API_KEY
        sync: false
